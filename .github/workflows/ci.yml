name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --no-deps --features telemetry-otel -- -D warnings

      - name: Unit tests
        run: cargo test --features telemetry-otel

  integration_github:
    name: Integration (GitHub, blocking)
    needs: test
    runs-on: ubuntu-latest
    if: ${{ secrets.GITHUB_TOKEN }}
    env:
      TOKEN_GITHUB: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Integration tests (GitHub)
        run: cargo test --features telemetry-otel --test integration -- --include-ignored github_

  integration_gitlab:
    name: Integration (GitLab, blocking)
    needs: test
    runs-on: ubuntu-latest
    if: ${{ secrets.GITLAB_TOKEN }}
    env:
      TOKEN_GITLAB: ${{ secrets.GITLAB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Integration tests (GitLab)
        run: cargo test --features telemetry-otel --test integration -- --include-ignored gitlab_

  integration_jira:
    name: Integration (Jira, advisory)
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ secrets.JIRA_TOKEN }}
    env:
      TOKEN_JIRA: ${{ secrets.JIRA_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Integration tests (Jira)
        run: cargo test --features telemetry-otel --test integration -- --include-ignored jira_

  integration_bitbucket:
    name: Integration (Bitbucket, advisory)
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ secrets.BITBUCKET_TOKEN && secrets.BITBUCKET_REPO && secrets.BITBUCKET_PR_ID }}
    env:
      TOKEN_BITBUCKET: ${{ secrets.BITBUCKET_TOKEN }}
      BITBUCKET_REPO: ${{ secrets.BITBUCKET_REPO }}
      BITBUCKET_PR_ID: ${{ secrets.BITBUCKET_PR_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Integration tests (Bitbucket)
        run: cargo test --features telemetry-otel --test integration -- --include-ignored bitbucket_

  docs:
    name: Docs
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect docs-related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - '.readthedocs.yml'

      - name: Set up Python
        if: steps.changes.outputs.docs == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        if: steps.changes.outputs.docs == 'true'
        run: pip install -r docs/requirements.txt

      - name: Docs build (strict)
        if: steps.changes.outputs.docs == 'true'
        run: mkdocs build --strict

      - name: Skip docs build (no docs changes)
        if: steps.changes.outputs.docs != 'true'
        run: echo "No docs-related changes detected; skipping docs build."

  test_no_telemetry:
    name: Test (no telemetry feature)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check build (no telemetry)
        run: cargo check --no-default-features

      - name: Unit tests (no telemetry)
        run: cargo test --no-default-features

  clippy_pedantic:
    name: Clippy (pedantic, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy pedantic
        run: cargo clippy --all-targets --no-deps --features telemetry-otel -- -W clippy::pedantic
