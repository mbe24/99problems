name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  # Resolve version from tag push or manual input
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  validate-release-version:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag format
        shell: bash
        run: |
          if [[ ! "${RELEASE_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Release version '${RELEASE_VERSION}' is invalid."
            echo "Expected format like v0.3.0 (optional prerelease/build suffix allowed)."
            exit 1
          fi

      - name: Ensure Cargo.toml version matches release tag
        shell: bash
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"

          if [[ -z "${cargo_version}" ]]; then
            echo "Could not read package version from Cargo.toml."
            exit 1
          fi

          if [[ "${cargo_version}" != "${release_version}" ]]; then
            echo "Version mismatch:"
            echo "  tag version:   ${release_version}"
            echo "  Cargo.toml:    ${cargo_version}"
            echo "Update Cargo.toml before creating/pushing the release tag."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate-release-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: "@mbe24/99problems-win32-x64"
            binary: "99problems.exe"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: "@mbe24/99problems-linux-x64"
            binary: "99problems"
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: "@mbe24/99problems-darwin-x64"
            binary: "99problems"
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: "@mbe24/99problems-darwin-arm64"
            binary: "99problems"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: "@mbe24/99problems-linux-arm64"
            binary: "99problems"
            use_cross: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build binary
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --no-default-features --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  publish-crates:
    name: Publish to crates.io
    needs:
      - validate-release-version
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify

  publish-npm:
    name: Publish npm packages
    needs:
      - validate-release-version
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Publish platform packages and main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ env.RELEASE_VERSION }}
        run: node .github/scripts/publish.js
