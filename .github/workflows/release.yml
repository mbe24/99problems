name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: "@mbe24/99problems-win32-x64"
            binary: "99problems.exe"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: "@mbe24/99problems-linux-x64"
            binary: "99problems"
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: "@mbe24/99problems-darwin-x64"
            binary: "99problems"
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: "@mbe24/99problems-darwin-arm64"
            binary: "99problems"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: "@mbe24/99problems-linux-arm64"
            binary: "99problems"
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build binary
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  publish-npm:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Publish platform packages and main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: node .github/scripts/publish.js
