[package]
name = "problems99"
version = "0.1.0"
edition = "2024"
description = "GitHub issue conversation fetcher CLI"
license = "MIT"

[[bin]]
name = "99problems"
path = "src/main.rs"

[lib]
name = "problems99"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "5"
reqwest = { version = "0.12", features = ["blocking", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"

[dev-dependencies]
serde_json = "1"
