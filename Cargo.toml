[package]
name = "problems99"
version = "0.2.0"
edition = "2024"
description = "GitHub issue conversation fetcher CLI"
license = "Apache-2.0"

[[bin]]
name = "99problems"
path = "src/main.rs"

[lib]
name = "problems99"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
clap_mangen = "0.2"
dirs = "6.0.0"
reqwest = { version = "0.12", features = ["blocking", "json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "1.0.3"
toml_edit = "0.22"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt"] }

[dev-dependencies]
serde_json = "1"
